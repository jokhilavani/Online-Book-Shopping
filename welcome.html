<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome - Book Verse</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #ffecd2, #fcb69f);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
    }

    .container {
      text-align: center;
      max-width: 700px;
      padding: 40px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      color: #444;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #666;
    }

    button {
      margin-top: 30px;
      padding: 12px 25px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #70e1f5, #ffd194);
      color: #000;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to BookVerse</h1>
    <p>
      Discover the world of books at BookVerse – your one-stop online bookstore where imagination meets information.
      Browse hundreds of books across various genres, add them to your cart or wishlist, and place your orders easily.
      Join us to embark on an amazing reading journey!
    </p>
    <button onclick="startShopping()">Start Shopping</button>
  </div>

  <script>
    function startShopping() {
      window.location.href = "signup-login.html";
    }
  </script>
</body>
</html>
