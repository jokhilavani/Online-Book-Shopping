<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Orders - Book Verse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #fffaf0, #e0f7fa);
      padding: 20px;
    }

    nav {
      display: flex;
      gap: 20px;
      justify-content: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 30px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      text-decoration: underline;
      transform: scale(1.1);
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .order-container {
      max-width: 1100px;
      margin: auto;
    }

    .order-list {
      display: flex;
      flex-wrap: wrap;
      gap: 25px;
      justify-content: center;
    }

    .order-card {
      background: linear-gradient(to bottom right, #ffffff, #e0f7fa);
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
      padding: 15px;
      width: 200px;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .order-card:hover {
      transform: scale(1.05);
    }

    .order-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 8px;
    }

    .book-title {
      font-weight: bold;
      margin: 10px 0 5px;
      color: #222;
    }

    .book-price {
      color: #0072ff;
      margin-bottom: 10px;
    }

    .cancel-btn {
      padding: 8px 10px;
      background: linear-gradient(to right, #d32f2f, #ff5252);
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s ease;
    }

    .cancel-btn:hover {
      opacity: 0.9;
      transform: scale(1.05);
    }

    .empty-message {
      text-align: center;
      color: #777;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <nav>
    <a href="home.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="wishlist.html">Wishlist</a>
    <a href="orders.html">Orders</a>
    <a href="login.html">Logout</a>
  </nav>

  <div class="order-container">
    <h1>My Orders</h1>
    <div class="order-list" id="orderContainer"></div>
    <p class="empty-message" id="emptyMsg" style="display:none;">No orders yet.</p>
  </div>

  <script>
    const orders = JSON.parse(localStorage.getItem("orders")) || [];
    const container = document.getElementById("orderContainer");
    const emptyMsg = document.getElementById("emptyMsg");

    function renderOrders() {
      container.innerHTML = '';
      if (orders.length === 0) {
        emptyMsg.style.display = "block";
        return;
      } else {
        emptyMsg.style.display = "none";
      }

      orders.forEach((book, index) => {
        const card = document.createElement("div");
        card.className = "order-card";
        card.innerHTML = `
          <img src="${book.image || 'placeholder.jpg'}" alt="${book.title}">
          <div class="book-title">${book.title}</div>
          <div class="book-price">₹${book.price}</div>
          <button class="cancel-btn">Cancel Order</button>
        `;

        card.querySelector(".cancel-btn").addEventListener("click", () => {
          if (confirm("Are you sure you want to cancel this order?")) {
            orders.splice(index, 1);
            localStorage.setItem("orders", JSON.stringify(orders));
            renderOrders();
            alert("Order canceled.");
          }
        });

        container.appendChild(card);
      });
    }

    renderOrders();
  </script>
</body>
</html>
