<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wishlist - Book Verse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Your existing styles remain unchanged */
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #f0f9ff, #cbebff);
      min-height: 100vh;
      padding: 20px;
    }

    nav {
      display: flex;
      gap: 20px;
      justify-content: center;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 30px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      text-decoration: underline;
      transform: scale(1.1);
    }

    .wishlist-container {
      max-width: 1100px;
      margin: auto;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }

    .book-list {
      display: flex;
      flex-wrap: wrap;
      gap: 25px;
      justify-content: center;
    }

    .book-card {
      background: linear-gradient(to bottom right, #ffffff, #e3f2fd);
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
      padding: 15px;
      width: 200px;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .book-card:hover {
      transform: scale(1.05);
    }

    .book-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 8px;
    }

    .book-title {
      font-weight: bold;
      margin: 10px 0 5px;
      color: #222;
    }

    .book-price {
      color: #0072ff;
      margin-bottom: 10px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .buttons button {
      padding: 8px;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .add-cart {
      background: linear-gradient(to right, #00c853, #64dd17);
      color: white;
    }

    .remove-wishlist {
      background: linear-gradient(to right, #d32f2f, #ff5252);
      color: white;
    }

    .buttons button:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    .empty-message {
      text-align: center;
      color: #777;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <nav>
    <a href="home.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="wishlist.html">Wishlist</a>
    <a href="orders.html">Orders</a>
    <a href="login.html">Logout</a>
  </nav>

  <div class="wishlist-container">
    <h1>My Wishlist</h1>
    <div class="book-list" id="wishlistContainer"></div>
    <p class="empty-message" id="emptyMsg" style="display: none;">Your wishlist is empty.</p>
  </div>

  <script>
    // Get data from localStorage
    const wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    const container = document.getElementById("wishlistContainer");
    const emptyMsg = document.getElementById("emptyMsg");

    function renderWishlist() {
      container.innerHTML = '';
      if (wishlist.length === 0) {
        emptyMsg.style.display = "block";
        return;
      } else {
        emptyMsg.style.display = "none";
      }

      wishlist.forEach((book, index) => {
        const card = document.createElement("div");
        card.className = "book-card";
        card.innerHTML = `
          <img src="${book.image}" alt="${book.title}">
          <div class="book-title">${book.title}</div>
          <div class="book-price">₹${book.price}</div>
          <div class="buttons">
            <button class="add-cart">Add to Cart</button>
            <button class="remove-wishlist">Remove</button>
          </div>
        `;

        // Add to cart functionality
        card.querySelector(".add-cart").addEventListener("click", () => {
          const exists = cart.some(item => item.title === book.title);
          if (!exists) {
            cart.push(book);
            localStorage.setItem("cart", JSON.stringify(cart));
            alert("Book added to cart!");
          } else {
            alert("Book is already in cart.");
          }
        });

        // Remove from wishlist functionality
        card.querySelector(".remove-wishlist").addEventListener("click", () => {
          wishlist.splice(index, 1);
          localStorage.setItem("wishlist", JSON.stringify(wishlist));
          renderWishlist();
          alert("Book removed from wishlist.");
        });

        container.appendChild(card);
      });
    }

    renderWishlist();
  </script>
</body>
</html>
