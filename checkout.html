<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout - Book Verse</title>
  <link rel="stylesheet" href="checkout.css">
</head>
<body>
  <nav>
    <a href="home.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="wishlist.html">Wishlist</a>
    <a href="orders.html">Orders</a>
    <a href="login.html">Logout</a>
  </nav>

  <div class="checkout-container">
    <h1>Checkout Summary</h1>
    <div id="checkoutList" class="checkout-list"></div>
    <div class="checkout-footer">
      <p><strong>Total Amount: ₹<span id="totalAmount">0</span></strong></p>
      <button onclick="confirmOrder()">Confirm Order</button>
    </div>
  </div>

  <script>
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const orders = JSON.parse(localStorage.getItem('orders')) || [];
    const checkoutList = document.getElementById('checkoutList');
    const totalAmount = document.getElementById('totalAmount');

    let total = 0;
    cart.forEach(item => {
      const div = document.createElement('div');
      div.className = 'checkout-item';
      div.innerHTML = `
        <img src="${item.image}" alt="${item.title}">
        <div>
          <h3>${item.title}</h3>
          <p>${item.description}</p>
          <p>Price: ₹${item.price}</p>
        </div>
      `;
      checkoutList.appendChild(div);
      total += parseFloat(item.price);
    });

    totalAmount.textContent = total.toFixed(2);

    function confirmOrder() {
      const updatedOrders = [...orders, ...cart];
      localStorage.setItem('orders', JSON.stringify(updatedOrders));
      localStorage.removeItem('cart');
      alert('Order confirmed! Redirecting to Orders page...');
      window.location.href = 'orders.html';
    }
  </script>
</body>
</html>
